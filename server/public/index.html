<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elemental Earth — 数据管理后台</title>
<style>
  :root {
    --bg: #1d232a;
    --bg-2: #252c34;
    --bg-3: #2d353f;
    --text: #e0e0e0;
    --text-2: #9ca3af;
    --primary: #4f8cff;
    --primary-hover: #3b7ae6;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --success: #22c55e;
    --border: #3a4450;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- Header ---- */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: var(--bg-2); border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ---- Tabs ---- */
  .tabs { display: flex; gap: 0; background: var(--bg-2); padding: 0 24px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent;
    font-size: 14px; color: var(--text-2); transition: all 0.15s; user-select: none;
  }
  .tab:hover { color: var(--text); background: var(--bg-3); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* ---- Main ---- */
  .main { padding: 16px 24px; }

  /* ---- Toolbar ---- */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .toolbar h2 { font-size: 16px; font-weight: 500; }
  .toolbar .count { color: var(--text-2); font-size: 13px; }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 14px; border: none; border-radius: var(--radius);
    font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: var(--danger-hover); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #16a34a; }
  .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg-3); color: var(--text); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ---- Table ---- */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  th { background: var(--bg-2); color: var(--text-2); font-weight: 500; position: sticky; top: 0; }
  tr:hover { background: var(--bg-3); }
  td.actions { white-space: nowrap; }
  td.actions .btn { margin-right: 4px; }
  .empty { text-align: center; padding: 40px; color: var(--text-2); font-size: 14px; }

  /* ---- Modal ---- */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
    justify-content: center; align-items: flex-start; padding: 40px 16px; z-index: 1000;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-2); border-radius: 8px; width: 100%; max-width: 720px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4); margin-bottom: 40px;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
  }
  .modal-header h3 { font-size: 16px; font-weight: 600; }
  .modal-close { cursor: pointer; font-size: 20px; color: var(--text-2); line-height: 1; background: none; border: none; padding: 4px; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px; }
  .modal-footer {
    display: flex; justify-content: flex-end; gap: 8px;
    padding: 14px 20px; border-top: 1px solid var(--border);
  }

  /* ---- Form ---- */
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 13px; color: var(--text-2); margin-bottom: 4px; font-weight: 500; }
  .form-row .hint { font-size: 11px; color: var(--text-2); margin-top: 2px; opacity: .6; }
  input, textarea, select {
    width: 100%; padding: 8px 10px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px;
    font-family: inherit;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--primary); }
  textarea { resize: vertical; min-height: 60px; font-family: monospace; }
  input[type="checkbox"] { width: auto; }
  .form-inline { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ---- Sub table (arrays of objects) ---- */
  .sub-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 4px; }
  .sub-table th { background: var(--bg-3); padding: 4px 8px; font-weight: 500; }
  .sub-table td { padding: 4px 8px; }
  .sub-table input { padding: 4px 6px; font-size: 12px; }
  .sub-table .btn { padding: 2px 8px; font-size: 11px; }

  /* ---- Toast ---- */
  .toast {
    position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; border-radius: var(--radius);
    font-size: 13px; z-index: 2000; transform: translateY(100px); opacity: 0;
    transition: all .3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); color: #fff; }
  .toast.error { background: var(--danger); color: #fff; }
  .toast.info { background: var(--primary); color: #fff; }

  /* ---- Tag input ---- */
  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 0; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-3); padding: 2px 8px; border-radius: 3px; font-size: 12px; }
  .tag .remove { cursor: pointer; color: var(--text-2); font-size: 14px; line-height: 1; }
  .tag .remove:hover { color: var(--danger); }
  .tag-input { display: flex; gap: 4px; }
  .tag-input input { width: auto; flex: 1; min-width: 60px; padding: 4px 6px; font-size: 12px; }
  .tag-input .btn { padding: 4px 8px; font-size: 11px; }

  /* ---- Publish status ---- */
  .publish-status { font-size: 12px; color: var(--text-2); }
  .publish-status.success { color: var(--success); }
  .publish-status.error { color: var(--danger); }

  /* ---- AI Generator ---- */
  .ai-section { max-width: 900px; margin: 0 auto; }
  .ai-input-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 20px; }
  .ai-input-row .form-row { flex: 1; margin-bottom: 0; }
  .ai-input-row .btn { padding: 8px 24px; font-size: 14px; white-space: nowrap; }
  .ai-loading { text-align: center; padding: 40px; color: var(--text-2); }
  .ai-loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-error { background: #3d1f1f; border: 1px solid var(--danger); padding: 12px 16px; border-radius: var(--radius); margin-bottom: 16px; color: #fca5a5; }
  .ai-result { margin-top: 16px; }
  .ai-result-section { margin-bottom: 24px; }
  .ai-result-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .ai-result-section .badge { font-size: 11px; background: var(--bg-3); color: var(--text-2); padding: 2px 8px; border-radius: 10px; }
  .ai-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 10px; }
  .ai-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .ai-card-header .name { font-weight: 600; font-size: 14px; }
  .ai-card-header .key-tag { font-size: 11px; color: var(--text-2); background: var(--bg-3); padding: 1px 6px; border-radius: 3px; }
  .ai-card-body { font-size: 13px; color: var(--text-2); }
  .ai-card-body .field { display: inline-flex; gap: 4px; margin-right: 12px; }
  .ai-card-body .field-label { color: var(--text-2); opacity: .6; }
  .ai-card-body .field-value { color: var(--text); }
  .ai-card-actions { margin-top: 8px; display: flex; gap: 6px; }
  .ai-empty { text-align: center; padding: 40px; color: var(--text-2); font-size: 14px; }
  .ai-hint { font-size: 12px; color: var(--text-2); opacity: .7; margin-top: 4px; }
  .ai-batch-actions { display: flex; gap: 8px; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>⚙️ Elemental Earth — 数据管理</h1>
  <div class="header-actions">
    <span id="publishStatus" class="publish-status"></span>
    <button class="btn btn-success" onclick="publish()">📦 发布</button>
  </div>
</div>

<div class="tabs" id="tabBar"></div>

<div class="main">
  <div class="toolbar">
    <h2 id="typeTitle">加载中...</h2>
    <span class="count" id="recordCount"></span>
    <button class="btn btn-primary" onclick="openAdd()">＋ 新增</button>
  </div>
  <div class="table-wrap">
    <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">编辑</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modalSave" onclick="saveRecord()">保存</button>
    </div>
  </div>
</div>

<!-- AI Generator Panel -->
<div id="aiPanel" class="main" style="display:none">
  <div class="ai-section">
    <div class="toolbar">
      <h2>🤖 AI 内容生成器</h2>
    </div>
    <p style="color:var(--text-2);font-size:13px;margin-bottom:16px">
      输入一种材料、矿物或元素的名称，AI 将根据现实世界的化学、矿物学和地理学知识，自动生成相关的游戏数据（物品、行动、科技、实验操作和配方）。
    </p>

    <div class="ai-input-row">
      <div class="form-row" style="margin:0">
        <label for="aiPrompt">输入材料/矿物/元素名称</label>
        <input type="text" id="aiPrompt" placeholder="例如：铁、赤铁矿、硫酸、石英、黄金…" onkeydown="if(event.key==='Enter') generateWithAI()">
      </div>
      <button class="btn btn-primary" id="aiGenerateBtn" onclick="generateWithAI()">🚀 生成</button>
    </div>

    <div id="aiLoading" class="ai-loading" style="display:none">
      <div class="spinner"></div>
      <div>AI 正在思考中，请稍候…<br><span style="font-size:12px;opacity:.6">基于真实化学和矿物学知识生成中</span></div>
    </div>

    <div id="aiError" class="ai-error" style="display:none"></div>

    <div id="aiResult" class="ai-result" style="display:none">
      <div class="ai-batch-actions">
        <button class="btn btn-success" onclick="saveAllGenerated()">💾 保存全部</button>
        <button class="btn btn-ghost" onclick="clearGenerated()">🗑 清空结果</button>
      </div>
      <div id="aiItemsSection" class="ai-result-section"></div>
      <div id="aiActionsSection" class="ai-result-section"></div>
      <div id="aiTechsSection" class="ai-result-section"></div>
      <div id="aiLabsSection" class="ai-result-section"></div>
      <div id="aiFormulasSection" class="ai-result-section"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ======== State ========
let models = [];              // 类型列表
let currentType = '';         // 当前选中的类型
let records = [];             // 当前类型的记录
let editingKey = null;        // 正在编辑的记录的 key
let isNewRecord = false;      // 是否为新增模式
let generatedData = null;     // AI 生成的数据缓存

// 字段类型分类
const FIELD_TAGS = {
  key: { label: '标识符', important: true },
  name: { label: '名称', important: true },
  category: { label: '分类', important: true },
  description: { label: '描述' },
  icon: { label: '图标' },
  time_required: { label: '所需时间(秒)', type: 'number' },
  probability: { label: '概率', type: 'number' },
  quantity: { label: '数量', type: 'number' },
  multiple: { label: '倍率', type: 'number' },
  durable: { label: '耐久度', type: 'number' },
  elemental: { label: '元素序数' },
  requires_burning: { label: '需要燃烧', type: 'boolean' },
  required_items: { label: '所需物品', type: 'objarray', fields: ['key','quantity','use'] },
  rewards: { label: '奖励', type: 'objarray', fields: ['key','quantity','probability','map'] },
  products: { label: '产物', type: 'objarray', fields: ['key','multiple'] },
  required_techs: { label: '前置科技', type: 'stringarray' },
  type: { label: '类型标签', type: 'stringarray' },
  map: { label: '解锁地图', type: 'stringarray' },
  required_item: { label: '所需物品', type: 'objarray', fields: ['key','quantity','use'] },
  required_container: { label: '要求容器' },
  required_actions: { label: '所需操作', type: 'object', fields: { key: '操作标识', min: '最少次数', max: '最多次数' } },
  position: { label: '位置', type: 'object', fields: { x: 'X', y: 'Y' } },
  attrs: { label: '其他属性', type: 'json' },
  products_title_note: false,
};

// ======== Init ========
async function init() {
  const resp = await fetch('/api');
  models = await resp.json();
  renderTabs();
  if (models.length) switchType(models[0].key);
}

// ======== AI Generator ========

async function generateWithAI() {
  const prompt = document.getElementById('aiPrompt').value.trim();
  if (!prompt) { toast('请输入材料或元素名称', 'error'); return; }

  const btn = document.getElementById('aiGenerateBtn');
  const loading = document.getElementById('aiLoading');
  const error = document.getElementById('aiError');
  const result = document.getElementById('aiResult');

  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  loading.style.display = 'block';
  error.style.display = 'none';
  result.style.display = 'none';
  generatedData = null;

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.error || '生成失败');

    generatedData = json.data;
    displayGeneratedData(json.data);
    result.style.display = 'block';
    toast('✅ 生成完成！请预览后保存', 'success');
  } catch (e) {
    error.textContent = '❌ ' + e.message;
    error.style.display = 'block';
    toast('生成失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 生成';
    loading.style.display = 'none';
  }
}

function displayGeneratedData(data) {
  renderGeneratedSection('aiItemsSection', '🧪 新物品', data.items, renderItemCard);
  renderGeneratedSection('aiActionsSection', '⚡ 新行动', data.actions, renderActionCard);
  renderGeneratedSection('aiTechsSection', '🔬 新科技', data.techs, renderTechCard);
  renderGeneratedSection('aiLabsSection', '🧫 新实验操作', data.labs, renderLabCard);
  renderGeneratedSection('aiFormulasSection', '📜 新配方', data.formulas, renderFormulaCard);
}

function renderGeneratedSection(containerId, title, items, renderFn) {
  const container = document.getElementById(containerId);
  if (!items || items.length === 0) {
    container.innerHTML = `<h3>${title} <span class="badge">0 项</span></h3><div class="ai-empty">（本次未生成）</div>`;
    return;
  }
  let html = `<h3>${title} <span class="badge">${items.length} 项</span></h3>`;
  for (const item of items) {
    html += renderFn(item);
  }
  container.innerHTML = html;
}

function renderItemCard(item) {
  const typeStr = (item.type || []).join(', ');
  const elementalStr = item.elemental ? `元素#${item.elemental}` : '';
  return `<div class="ai-card">
    <div class="ai-card-header">
      <div><span class="name">${escHtml(item.name)}</span> <span class="key-tag">${escHtml(item.key)}</span></div>
      <span style="font-size:12px;color:var(--primary)">${escHtml(item.category)}</span>
    </div>
    <div class="ai-card-body">
      <p style="margin-bottom:4px">${escHtml(item.description)}</p>
      <div>
        ${typeStr ? `<span class="field"><span class="field-label">类型:</span> <span class="field-value">${escHtml(typeStr)}</span></span>` : ''}
        ${elementalStr ? `<span class="field"><span class="field-label">元素:</span> <span class="field-value">${escHtml(elementalStr)}</span></span>` : ''}
        ${item.durable ? `<span class="field"><span class="field-label">耐久:</span> <span class="field-value">${item.durable}</span></span>` : ''}
      </div>
    </div>
    <div class="ai-card-actions">
      <button class="btn btn-primary btn-sm" onclick="saveSingle('items', '${item.key}')">💾 保存</button>
      <button class="btn btn-ghost btn-sm" onclick="viewRaw('items', '${item.key}')">👁 查看</button>
    </div>
  </div>`;
}

function renderActionCard(action) {
  const rewardsStr = (action.rewards || []).map(r => `${r.key}×${r.quantity}(${r.probability})`).join(', ');
  const itemsStr = (action.required_items || []).map(r => `${r.key}×${r.quantity}`).join(', ');
  const mapStr = (action.map || []).join(', ');
  const techStr = (action.required_techs || []).join(', ');
  return `<div class="ai-card">
    <div class="ai-card-header">
      <div><span class="name">${escHtml(action.name)}</span> <span class="key-tag">${escHtml(action.key)}</span></div>
      <span style="font-size:12px;color:var(--primary)">${escHtml(action.category)}</span>
    </div>
    <div class="ai-card-body">
      <p style="margin-bottom:4px">${escHtml(action.description)}</p>
      <div>
        <span class="field"><span class="field-label">耗时:</span> <span class="field-value">${action.time_required || 0}s</span></span>
        ${itemsStr ? `<span class="field"><span class="field-label">需求:</span> <span class="field-value">${escHtml(itemsStr)}</span></span>` : ''}
        ${rewardsStr ? `<span class="field"><span class="field-label">奖励:</span> <span class="field-value">${escHtml(rewardsStr)}</span></span>` : ''}
        ${techStr ? `<span class="field"><span class="field-label">科技:</span> <span class="field-value">${escHtml(techStr)}</span></span>` : ''}
        ${mapStr ? `<span class="field"><span class="field-label">地图:</span> <span class="field-value">${escHtml(mapStr)}</span></span>` : ''}
      </div>
    </div>
    <div class="ai-card-actions">
      <button class="btn btn-primary btn-sm" onclick="saveSingle('actions', '${action.key}')">💾 保存</button>
      <button class="btn btn-ghost btn-sm" onclick="viewRaw('actions', '${action.key}')">👁 查看</button>
    </div>
  </div>`;
}

function renderTechCard(tech) {
  const itemsStr = (tech.required_items || []).map(r => `${r.key}×${r.quantity}`).join(', ');
  const techStr = (tech.required_techs || []).join(', ');
  return `<div class="ai-card">
    <div class="ai-card-header">
      <div><span class="name">${escHtml(tech.name)}</span> <span class="key-tag">${escHtml(tech.key)}</span></div>
    </div>
    <div class="ai-card-body">
      <p style="margin-bottom:4px">${escHtml(tech.description)}</p>
      <div>
        <span class="field"><span class="field-label">耗时:</span> <span class="field-value">${tech.time_required || 30}s</span></span>
        ${itemsStr ? `<span class="field"><span class="field-label">需求:</span> <span class="field-value">${escHtml(itemsStr)}</span></span>` : ''}
        ${techStr ? `<span class="field"><span class="field-label">前置:</span> <span class="field-value">${escHtml(techStr)}</span></span>` : ''}
      </div>
    </div>
    <div class="ai-card-actions">
      <button class="btn btn-primary btn-sm" onclick="saveSingle('techs', '${tech.key}')">💾 保存</button>
      <button class="btn btn-ghost btn-sm" onclick="viewRaw('techs', '${tech.key}')">👁 查看</button>
    </div>
  </div>`;
}

function renderLabCard(lab) {
  const itemsStr = (lab.required_item || []).map(r => `${r.key}×${r.quantity}`).join(', ');
  const techStr = (lab.required_techs || []).join(', ');
  const burnStr = lab.requires_burning === true ? '🔥 需燃烧' : lab.requires_burning === false ? '❄️ 无需燃烧' : '';
  return `<div class="ai-card">
    <div class="ai-card-header">
      <div><span class="name">${escHtml(lab.name)}</span> <span class="key-tag">${escHtml(lab.key)}</span></div>
      ${burnStr ? `<span style="font-size:12px">${escHtml(burnStr)}</span>` : ''}
    </div>
    <div class="ai-card-body">
      <p style="margin-bottom:4px">${escHtml(lab.description)}</p>
      <div>
        <span class="field"><span class="field-label">耗时:</span> <span class="field-value">${lab.time_required || 20}s</span></span>
        ${itemsStr ? `<span class="field"><span class="field-label">需求:</span> <span class="field-value">${escHtml(itemsStr)}</span></span>` : ''}
        ${techStr ? `<span class="field"><span class="field-label">前置:</span> <span class="field-value">${escHtml(techStr)}</span></span>` : ''}
      </div>
    </div>
    <div class="ai-card-actions">
      <button class="btn btn-primary btn-sm" onclick="saveSingle('labs', '${lab.key}')">💾 保存</button>
      <button class="btn btn-ghost btn-sm" onclick="viewRaw('labs', '${lab.key}')">👁 查看</button>
    </div>
  </div>`;
}

function renderFormulaCard(formula) {

  const containerStr = formula.required_container ? `容器: ${formula.required_container}` : '';
  const actionStr = formula.required_actions ? `操作: ${formula.required_actions.key}${formula.required_actions.min ? '×'+formula.required_actions.min : ''}` : '';

  return `<div class="ai-card">
    <div class="ai-card-header">
      <div><span class="name">${escHtml(formula.name)}</span> <span class="key-tag">${escHtml(formula.key)}</span></div>
    </div>
    <div class="ai-card-body">
      <p style="margin-bottom:4px">${escHtml(formula.description)}</p>
      <div>

        ${itemsStr ? `<span class="field"><span class="field-label">原料:</span> <span class="field-value">${escHtml(itemsStr)}</span></span>` : ''}
        ${prodStr ? `<span class="field"><span class="field-label">产物:</span> <span class="field-value">${escHtml(prodStr)}</span></span>` : ''}
        ${containerStr ? `<br><span class="field"><span class="field-label">${escHtml(containerStr)}</span></span>` : ''}
        ${actionStr ? `<span class="field"><span class="field-label">${escHtml(actionStr)}</span></span>` : ''}
        ${techStr ? `<br><span class="field"><span class="field-label">前置科技:</span> <span class="field-value">${escHtml(techStr)}</span></span>` : ''}

/** 保存单条生成的数据 */
async function saveSingle(type, key) {
  if (!generatedData || !generatedData[type]) {
    toast('没有可保存的数据', 'error');
    return;
  }
  const record = generatedData[type].find(r => r.key === key);
  if (!record) {
    toast('数据不存在', 'error');
    return;
  }
  try {
    const resp = await fetch(`/api/${type}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(record),
    });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.error || '保存失败');
    toast(`✅ ${type}/${key} 已保存`, 'success');
    _allRecordsCache = {};
  } catch (e) {
    toast(`保存失败: ${e.message}`, 'error');
  }
}

/** 保存所有生成的数据 */
async function saveAllGenerated() {
  if (!generatedData) {
    toast('没有可保存的数据', 'error');
    return;
  }
  const types = ['items', 'actions', 'techs', 'labs', 'formulas'];
  let success = 0, fail = 0;
  for (const type of types) {
    const list = generatedData[type] || [];
    for (const record of list) {
      try {
        const resp = await fetch(`/api/${type}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(record),
        });
        const json = await resp.json();
        if (resp.ok) {
          success++;
        } else {
          console.warn(`保存 ${type}/${record.key} 失败:`, json.error);
          fail++;
        }
      } catch (e) {
        console.warn(`保存 ${type}/${record.key} 失败:`, e.message);
        fail++;
      }
    }
  }
  _allRecordsCache = {};
  toast(`✅ 保存完成：成功 ${success} 项${fail ? `，失败 ${fail} 项` : ''}`, fail ? 'error' : 'success');
}

/** 查看原始 JSON */
function viewRaw(type, key) {
  if (!generatedData || !generatedData[type]) return;
  const record = generatedData[type].find(r => r.key === key);
  if (!record) return;
  alert(JSON.stringify(record, null, 2));
}

function clearGenerated() {

function renderTabs() {

// ======== Load ========
async function loadRecords() {
  const model = models.find(m => m.key === currentType);
  document.getElementById('typeTitle').textContent = model ? model.label : '加载中...';
  try {
    const resp = await fetch(`/api/${currentType}`);
    records = await resp.json();
  } catch {
    records = [];
  }
  document.getElementById('recordCount').textContent = `共 ${records.length} 条`;
  renderTable();
}

// ======== Table ========
function renderTable() {
  if (!records.length) {
    document.getElementById('tableHead').innerHTML = '';
    document.getElementById('tableBody').innerHTML = '<tr><td class="empty" colspan="10">暂无数据</td></tr>';
    return;
  }

  // 决定显示哪些列：取所有记录字段的并集，排 name/key 在最前
  const keySet = new Set();
  records.forEach(r => Object.keys(r).forEach(k => keySet.add(k)));
  let fields = [...keySet];

  // 移除太复杂的字段（对象数组用单独处理）
  const complexTypes = ['required_items','rewards','products','required_item','type'];
  const priorityFields = ['name','key','category','description','time_required','icon','requires_burning',
    'required_container','elemental','durable'];
  const ordered = [];
  for (const f of priorityFields) { if (fields.includes(f)) { ordered.push(f); fields = fields.filter(x => x !== f); } }
  // 剩下的按字母序
  fields.sort();
  // 最后放操作列
  const displayFields = [...ordered, ...fields.filter(f => !complexTypes.includes(f) && !['attrs','position'].includes(f) && !['required_techs','required_actions','map'].includes(f))];

  const head = document.getElementById('tableHead');
  head.innerHTML = '<tr>' + displayFields.map(f => `<th>${FIELD_TAGS[f]?.label || f}</th>`).join('') + '<th>操作</th></tr>';

  const body = document.getElementById('tableBody');
  body.innerHTML = records.map(r => {
    const vals = displayFields.map(f => {
      let v = r[f];
      if (v === undefined || v === null) return '<span style="color:var(--text-2);opacity:.4">—</span>';
      if (Array.isArray(v)) return `<span style="color:var(--text-2)">[${v.length} 项]</span>`;
      if (typeof v === 'object') return `<span style="color:var(--text-2)">{…}</span>`;
      if (typeof v === 'boolean') return v ? '✅' : '❌';
      v = String(v);
      return v.length > 30 ? v.slice(0, 30) + '…' : v;
    }).join('</td><td>');
    return `<tr><td>${vals}</td><td class="actions">
      <button class="btn btn-primary btn-sm" onclick="openEdit('${r.key}')">编辑</button>
      <button class="btn btn-danger btn-sm" onclick="deleteRecord('${r.key}')">删除</button>
    </td></tr>`;
  }).join('');
}

// 获取某个类型的所有记录（用于下拉选择引用）
let _allRecordsCache = {};
async function getRecordsForType(type) {
  if (!_allRecordsCache[type]) {
    const resp = await fetch(`/api/${type}`);
    _allRecordsCache[type] = await resp.json();
  }
  return _allRecordsCache[type];

// 构建表单
async function buildForm(record) {
  const model = models.find(m => m.key === currentType);
  if (!model) return;

  // 确定要展示的字段：取所有记录公共字段 + 当前记录字段
  const keySet = new Set();
  records.forEach(r => Object.keys(r).forEach(k => keySet.add(k)));
  if (record) Object.keys(record).forEach(k => keySet.add(k));

  let fields = [...keySet];

  // 字段顺序
  const fieldOrder = ['key','name','category','description','icon','type','time_required','probability',
    'quantity','multiple','durable','elemental','requires_burning',
    'required_items','required_item','required_techs','required_container','required_actions',
    'rewards','products','map','position','attrs'];

  fields.sort((a, b) => {
    const ai = fieldOrder.indexOf(a), bi = fieldOrder.indexOf(b);
    if (ai >= 0 && bi >= 0) return ai - bi;
    if (ai >= 0) return -1; if (bi >= 0) return 1;
    return a.localeCompare(b);
  });

  const container = document.getElementById('modalBody');
  container.innerHTML = '';

  for (const f of fields) {
    const tag = FIELD_TAGS[f] || {};
    if (tag === false) continue; // 隐藏字段
    const label = tag.label || f;
    const val = record ? record[f] : undefined;
    const importHint = getReferenceHint(f);
    const isKeyField = f === 'key' && !isNewRecord;

    const row = document.createElement('div');
    row.className = 'form-row';
    row.dataset.field = f;

    let html = `<label>${label}${importHint ? ' <span style="opacity:.6;font-weight:400">' + importHint + '</span>' : ''}</label>`;

    if (f === 'key' && !isNewRecord) {
      // 编辑时 key 只读
      html += `<input type="text" value="${escHtml(val)}" readonly style="opacity:.6" data-field="${f}">`;
    } else if (tag.type === 'number') {
      html += `<input type="number" step="any" value="${val ?? ''}" data-field="${f}">`;
    } else if (tag.type === 'boolean') {
      html += `<label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" ${val ? 'checked' : ''} data-field="${f}">
        <span>${label}</span></label>`;
    } else if (tag.type === 'json') {
      html += `<textarea data-field="${f}" rows="3">${val ? escHtml(JSON.stringify(val, null, 2)) : ''}</textarea>`;
    } else if (tag.type === 'stringarray') {
      // 标签输入
      const arr = val || [];
      html += `<div class="tag-list" id="tags_${f}">`;
      for (const item of arr) {
        html += `<span class="tag">${escHtml(item)} <span class="remove" onclick="this.parentElement.remove()">&times;</span></span>`;
      }
      html += `</div>
        <div class="tag-input">
          <input type="text" placeholder="输入后点击添加" id="tagInput_${f}"${getRefType(f) ? ` list="ref_${getRefType(f)}"` : ''} onkeydown="if(event.key==='Enter'){event.preventDefault();addTag('${f}')}">
          <button class="btn btn-ghost btn-sm" onclick="addTag('${f}')">添加</button>
        </div>`;
    } else if (tag.type === 'objarray') {
      // 对象数组子表格
      const subFields = tag.fields || ['key','quantity'];
      const arr = val || [];
      html += `<table class="sub-table" id="subtable_${f}"><thead><tr>`;
      for (const sf of subFields) html += `<th>${FIELD_TAGS[sf]?.label || sf}</th>`;
      html += '<th>操作</th></tr></thead><tbody>';
      for (let i = 0; i < arr.length; i++) {
        html += '<tr>';
        for (const sf of subFields) {
          const sv = arr[i][sf] !== undefined ? (Array.isArray(arr[i][sf]) ? arr[i][sf].join(', ') : String(arr[i][sf])) : '';
          const refType = getRefType(f, sf);
          const listAttr = refType ? ` list="ref_${refType}"` : '';
          html += `<td><input type="text" value="${escHtml(String(sv))}" data-row="${i}" data-subfield="${sf}"${listAttr}></td>`;
        }
        html += `<td><button class="btn btn-danger btn-sm" onclick="removeSubRow('${f}',${i})">删除</button></td></tr>`;
      }
      html += '</tbody></table>';
      html += `<button class="btn btn-ghost btn-sm" style="margin-top:4px" onclick="addSubRow('${f}')">＋ 添加行</button>`;
    } else if (tag.type === 'object') {
      // 简单对象（position, required_actions）
      const objFields = tag.fields || {};
      const obj = val || {};
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
      for (const [k, vLabel] of Object.entries(objFields)) {
        const v = obj[k] !== undefined ? obj[k] : '';
        const refType = getRefType(f, k);
        const listAttr = refType ? ` list="ref_${refType}"` : '';
        html += `<div style="flex:1;min-width:80px"><span style="font-size:11px;color:var(--text-2)">${vLabel}</span>
          <input type="text" value="${escHtml(String(v))}" data-field="${f}" data-subkey="${k}"${listAttr}></div>`;
      }
      html += '</div>';
    } else {
      // 普通文本
      const isLong = val && String(val).length > 40;
      const refType = getRefType(f);
      const listAttr = refType ? ` list="ref_${refType}"` : '';
      if (isLong) {
        html += `<textarea data-field="${f}" rows="3">${escHtml(val ?? '')}</textarea>`;
      } else {
        html += `<input type="text" value="${escHtml(val ?? '')}" data-field="${f}"${listAttr}>`;
      }
    }

    row.innerHTML = html;
    container.appendChild(row);
  }

  // 填充引用类型的 datalist
  const neededRefs = new Set();
  container.querySelectorAll('input[list^="ref_"]').forEach(inp => {
    neededRefs.add(inp.getAttribute('list').replace('ref_', ''));
  });
  for (const refType of neededRefs) {
    const options = await fetchRefOptions(refType);
    const dl = document.createElement('datalist');
    dl.id = `ref_${refType}`;
    for (const opt of options) {
      const o = document.createElement('option');
      o.value = `${opt.key} - ${opt.name}`;
      dl.appendChild(o);
    }
    container.appendChild(dl);
  }
}

function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 引用提示
function getReferenceHint(field) {
  const hints = {
    key: '用于代码中引用的唯一标识符；逗号分隔表示可替代（如公式的所需物品）',
    required_items: '引用 items 的 key',
    rewards: '引用 items 的 key',
    products: '引用 items 的 key',
    required_techs: '引用 techs 的 key',
    required_container: '引用 items 的 key（容器类）',
    required_actions: '引用 labs 的 key',
    required_item: '引用 items 的 key',
    map: '引用 maps 的 key',
    type: '物品类型标签，如 material, tool, container, fuel, gas, liquid, fire_source',
    quantity: '数量；逗号分隔如 5,7,8 表示随机取值',
    probability: '权重值，越高越容易获得',
    use: '每次消耗的耐久度（0-1）',
    durable: '最大耐久度',
    attrs: '额外属性 JSON，如 {"burn_time":30}',
    icon: 'Iconify 图标名，如 hugeicons:mountain',
    burns: '燃料燃烧时长（秒）',
    multiple: '产物数量',
    elemental: '元素在周期表中的序数',
  };
  return hints[field] || '';
}

// ---- 引用选择（自动完成） ----

/** 字段名 → 引用的数据类型 key */
function getRefType(field, subfield) {
  if (subfield === 'key' && ['required_items','required_item','rewards','products'].includes(field)) return 'items';
  if (field === 'required_actions' && subfield === 'key') return 'labs';
  if (field === 'required_techs') return 'techs';
  if (field === 'map') return 'maps';
  if (field === 'required_container') return 'items';
  if (field === 'elemental') return 'elements';
  return null;
}

let _refCache = {};

async function fetchRefOptions(refType) {
  if (!_refCache[refType]) {
    const resp = await fetch(`/api/${refType}`);
    const raw = await resp.json();
    // 元素数据用 number 作 key，name 拼接符号
    if (refType === 'elements') {
      _refCache[refType] = raw.map(e => ({ key: e.number, name: `${e.symbol} ${e.name}` }));
    } else {
      _refCache[refType] = raw;
    }
  }
  return _refCache[refType];
}

/** 从 "key - name" 格式中提取 key */
function parseKey(val) {
  const idx = val.indexOf(' - ');
  return idx >= 0 ? val.slice(0, idx).trim() : val.trim();
}

// ---- Tag helpers ----
function addTag(field) {
  const input = document.getElementById(`tagInput_${field}`);
  const val = input.value.trim();
  if (!val) return;
  const list = document.getElementById(`tags_${field}`);
  const tag = document.createElement('span');
  tag.className = 'tag';
  tag.innerHTML = `${escHtml(val)} <span class="remove" onclick="this.parentElement.remove()">&times;</span>`;
  list.appendChild(tag);
  input.value = '';
  input.focus();
}


// ---- Sub-row helpers ----
function addSubRow(field) {
  const tbody = document.querySelector(`#subtable_${field} tbody`);
  const thead = document.querySelector(`#subtable_${field} thead`);
  if (!thead || !tbody) return;
  const cols = thead.querySelectorAll('th').length - 1; // exclude actions
  const subFields = FIELD_TAGS[field]?.fields || [];
  let html = '<tr>';
  for (let i = 0; i < cols; i++) {
    const sf = subFields[i] || 'key';
    const refType = getRefType(field, sf);
    const listAttr = refType ? ` list="ref_${refType}"` : '';
    html += `<td><input type="text" value="" data-row="-1" data-subfield="${sf}"${listAttr}></td>`;
  }
  html += `<td><button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">删除</button></td></tr>`;
  tbody.insertAdjacentHTML('beforeend', html);
}

function removeSubRow(field, idx) {
  const tbody = document.querySelector(`#subtable_${field} tbody`);
  if (tbody && tbody.children[idx]) tbody.children[idx].remove();
}

// ======== Save ========
async function saveRecord() {
  const container = document.getElementById('modalBody');
  const data = {};

  for (const row of container.querySelectorAll('.form-row')) {
    const f = row.dataset.field;
    const tag = FIELD_TAGS[f] || {};

    if (tag.type === 'boolean') {
      const cb = row.querySelector('input[type="checkbox"]');
      data[f] = cb ? cb.checked : false;
    } else if (tag.type === 'number') {
      const input = row.querySelector('input[type="number"]');
      data[f] = input ? (input.value === '' ? undefined : Number(input.value)) : undefined;
    } else if (tag.type === 'json') {
      const ta = row.querySelector('textarea');
      if (ta && ta.value.trim()) {
        try { data[f] = JSON.parse(ta.value); } catch { toast('JSON 格式错误: ' + f, 'error'); return; }
      } else {
        data[f] = undefined;
      }
    } else if (tag.type === 'stringarray') {
      const list = row.querySelector('.tag-list');
      const arr = [];
      if (list) {
        for (const tagEl of list.querySelectorAll('.tag')) {
          const text = tagEl.textContent.replace('×', '').trim();
          if (text) arr.push(text);
        }
      }
      data[f] = arr.length ? arr : undefined;
    } else if (tag.type === 'objarray') {
      const tbody = row.querySelector('.sub-table tbody');
      const arr = [];
      if (tbody) {
        for (const tr of tbody.querySelectorAll('tr')) {
          const obj = {};
          for (const input of tr.querySelectorAll('input')) {
            const sf = input.dataset.subfield;
            if (sf) {
              let v = input.value.trim();
              if (v === '') continue;
              // 逗号分隔的 key 存为数组（公式 required_items 的替代物品）
              if (sf === 'key' && v.includes(',')) {
                v = v.split(',').map(s => s.trim()).filter(s => s);
              }
              // 引用字段的自动完成值，提取 key
              if (sf === 'key' && getRefType(f, 'key')) {
                const parsed = Array.isArray(v) ? v.map(x => parseKey(x)) : parseKey(v);
                // 数字转换（数字作为 number 保存）
                if (!isNaN(Number(parsed)) && parsed !== '') { v = Number(parsed); }
                else { v = parsed; }
              } else if (!isNaN(Number(v)) && v !== '') {
                v = Number(v);
              }
              // 数量/概率支持逗号分隔的数组值，如 "5,7,8" → [5,7,8]
              if ((sf === 'quantity' || sf === 'multiple') && typeof v === 'string' && v.includes(',')) {
                v = v.split(',').map(s => {
                  const trimmed = s.trim()
                  return isNaN(Number(trimmed)) ? trimmed : Number(trimmed)
                }).filter(s => s !== '')
              }
              obj[sf] = v;
            }
          }
          if (Object.keys(obj).length) arr.push(obj);
        }
      }
      data[f] = arr.length ? arr : undefined;
    } else if (tag.type === 'object') {
      const obj = {};
      for (const input of row.querySelectorAll('input')) {
        const sk = input.dataset.subkey;
        if (sk) {
          let v = input.value.trim();
          if (v === '') continue;
          if (!isNaN(Number(v)) && v !== '') v = Number(v);
          obj[sk] = v;
        }
      }
      data[f] = Object.keys(obj).length ? obj : undefined;
    } else {
      // key 只读字段
      const input = row.querySelector('input[type="text"]') || row.querySelector('textarea');
      if (input && !input.readOnly) {
        let v = input.value.trim() || undefined;
        if (v !== undefined && !isNaN(Number(v)) && v !== '') v = Number(v);
        data[f] = v;
      } else if (input && input.readOnly) {
        data[f] = input.value.trim();
      }
    }
  }

  // 清理 undefined 字段
  for (const [k, v] of Object.entries(data)) {
    if (v === undefined || v === '' || (Array.isArray(v) && v.length === 0)) {
      delete data[k];
    }
  }

  // 确保 key 存在
  if (!data.key) { toast('key 字段不能为空', 'error'); return; }

  try {
    let resp;
    if (isNewRecord) {
      resp = await fetch(`/api/${currentType}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
      });
    } else {
      resp = await fetch(`/api/${currentType}/${editingKey}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
      });
    }
    const result = await resp.json();
    if (!resp.ok) { toast(result.error || '保存失败', 'error'); return; }
    toast('保存成功', 'success');
    closeModal();
    _allRecordsCache = {};
    loadRecords();
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  }
}

// ======== Delete ========
async function deleteRecord(key) {
  if (!confirm(`确定删除 key="${key}" 的记录？`)) return;
  try {
    const resp = await fetch(`/api/${currentType}/${key}`, { method: 'DELETE' });
    const result = await resp.json();
    if (!resp.ok) { toast(result.error || '删除失败', 'error'); return; }
    toast('删除成功', 'success');
    _allRecordsCache = {};
    loadRecords();
  } catch (e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

// ======== Publish ========
async function publish() {
  const btn = document.querySelector('.btn-success');
  btn.disabled = true;
  btn.textContent = '⏳ 发布中...';
  const status = document.getElementById('publishStatus');
  try {
    const resp = await fetch('/api/publish', { method: 'POST' });
    const result = await resp.json();
    if (!resp.ok) throw new Error(result.error);
    if (result.errors?.length) {
      status.textContent = '⚠️ ' + result.errors.join('; ');
      status.className = 'publish-status error';
    } else {
      status.textContent = '✅ ' + new Date().toLocaleTimeString() + ' 已发布';
      status.className = 'publish-status success';
    }
    toast('发布成功', 'success');
  } catch (e) {
    status.textContent = '❌ ' + e.message;
    status.className = 'publish-status error';
    toast('发布失败: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '📦 发布';
}

// ======== Toast ========
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ======== Start ========
init();
</script>
</body>
</html>
